<!DOCTYPE html>
<html>
<head>

<title>QA AI Assistant</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

</head>

<body>

<div class="container mt-5">

  <div class="card">

    <div class="card-header">
      <h3>QA AI Assistant</h3>
    </div>

    <div class="card-body">

      <div class="mb-3">
        <label class="form-label">
          Story Name
        </label>

        <input
          id="storyName"
          class="form-control">
      </div>

      <div class="mb-3">
        <label class="form-label">
          Story Description
        </label>

        <textarea
          id="storyDescription"
          rows="8"
          class="form-control">
        </textarea>
      </div>

      <button
  class="btn btn-primary"
  onclick="generateTestCases()">
  Generate Test Cases
</button>

    </div>

  </div>

</div>
<div class="container mt-4">

  <div id="resultSection" style="display:none;">
    <h3>Generated Test Cases</h3>

    <div class="border rounded p-3 bg-light">

  <table class="table table-bordered">

    <thead class="table-dark">

      <tr>
        <th>ID</th>
        <th>Type</th>
        <th>Title</th>
        <th>Action</th>
      </tr>

    </thead>

    <tbody id="testcaseResults">
    </tbody>

  </table>

</div>

    <div class="mt-3">
      <button
        class="btn btn-success"
        onclick="exportExcel()">
        Export to Excel
      </button>

      <button
        class="btn btn-primary"
        onclick="uploadToZephyr()">
        Upload to Zephyr
      </button>
    </div>

  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="/static/app.js"></script>

<div
  class="modal fade"
  id="editModal"
  tabindex="-1">

  <div class="modal-dialog modal-lg">

    <div class="modal-content">

      <div class="modal-header">

        <h5 class="modal-title">
          Edit Test Case
        </h5>

        <button
          type="button"
          class="btn-close"
          data-bs-dismiss="modal">
        </button>

      </div>

      <div class="modal-body">

        <div class="mb-3">

          <label>Title</label>

          <input
            id="editTitle"
            class="form-control">

        </div>

        <div class="mb-3">

          <label>Priority</label>

          <input
            id="editPriority"
            class="form-control">

        </div>

        <div class="mb-3">

          <label>Preconditions</label>

          <textarea
            id="editPreconditions"
            rows="3"
            class="form-control">
          </textarea>

        </div>

        <div class="mb-3">

          <label>Steps</label>

          <textarea
            id="editSteps"
            rows="5"
            class="form-control">
          </textarea>

        </div>

        <div class="mb-3">

          <label>Expected Result</label>

          <textarea
            id="editExpectedResult"
            rows="3"
            class="form-control">
          </textarea>

        </div>

      </div>

      <div class="modal-footer">

        <button
          class="btn btn-success"
          onclick="saveTestCase()">

          Save

        </button>

      </div>

    </div>

  </div>

</div>
</body>
</html>
